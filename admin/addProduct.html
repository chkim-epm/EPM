    // Supabase 브라우저 클라이언트 인스턴스
   // ⭐ 쿠키 기반 Session Storage (브라우저 종료 시 로그인 휘발)
// ⭐ 쿠키 기반 Session Storage (대용량 대응: 쿠키 쪼개서 저장)
// - 브라우저 종료 시 휘발: Expires/Max-Age 없이 "세션 쿠키"로 저장
// - 1쿠키 4KB 제한 회피: key를 key.0, key.1 ...로 분할 저장
const cookieStorage = (() => {
  const CHUNK_SIZE = 3000; // 안전 여유 (쿠키 오버헤드 고려)
  const OPTS = "path=/; SameSite=Lax; Domain=.eastpowermetal.com"; // ✅ 변경: www/non-www 모두에서 쿠키 공유

  const getCookie = (name) => {
    const m = document.cookie.match(new RegExp("(^| )" + name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "=([^;]+)"));
    return m ? decodeURIComponent(m[2]) : null;
  };

  const setCookie = (name, value) => {
    document.cookie = `${name}=${encodeURIComponent(value)}; ${OPTS}`;
  };

  const delCookie = (name) => {
    document.cookie = `${name}=; Max-Age=0; path=/; Domain=.eastpowermetal.com`; // ✅ 변경: 삭제도 동일 도메인 범위로
  };

  return {
    getItem: (key) => {
      const meta = getCookie(`${key}.__chunks`);
      if (!meta) return getCookie(key); // (과거 단일 쿠키 호환)
      const n = Number(meta);
      if (!Number.isFinite(n) || n <= 0) return null;

      let out = "";
      for (let i = 0; i < n; i++) {
        const part = getCookie(`${key}.${i}`);
        if (part == null) return null; // 중간 조각 누락
        out += part;
      }
      return out;
    },

    setItem: (key, value) => {
      // 기존 조각 제거
      const old = getCookie(`${key}.__chunks`);
      if (old) {
        const nOld = Number(old);
        if (Number.isFinite(nOld) && nOld > 0) {
          for (let i = 0; i < nOld; i++) delCookie(`${key}.${i}`);
        }
        delCookie(`${key}.__chunks`);
      }
      delCookie(key); // 단일 쿠키 쓰던 흔적 제거

      // 분할 저장
      const str = String(value ?? "");
      const chunks = [];
      for (let i = 0; i < str.length; i += CHUNK_SIZE) {
        chunks.push(str.slice(i, i + CHUNK_SIZE));
      }
      setCookie(`${key}.__chunks`, String(chunks.length));
      chunks.forEach((c, i) => setCookie(`${key}.${i}`, c));
    },

    removeItem: (key) => {
      const meta = getCookie(`${key}.__chunks`);
      if (meta) {
        const n = Number(meta);
        if (Number.isFinite(n) && n > 0) {
          for (let i = 0; i < n; i++) delCookie(`${key}.${i}`);
        }
        delCookie(`${key}.__chunks`);
      }
      delCookie(key);
    }
  };
})();

    /* -------------------------------------------------------------------------
       URL에 OAuth code/access_token이 실려온 경우 세션 교환
       - GitHub OAuth 성공 후 Supabase가 부여한 code/hash를 세션으로 바꿔 로그인 확립
       ------------------------------------------------------------------------- */
    async function ensureSessionFromURL() {
      if (location.search.includes("code=") || location.hash.includes("access_token")) {
        try { await sb.auth.exchangeCodeForSession(window.location.href); } catch (_) {}
      }
    }

    /* -------------------------------------------------------------------------
       1) 관리자 가드
       - ① 세션 조회: user가 없으면 로그인 페이지로
       - ② 화이트리스트(email 또는 GitHub user_name) 검증
       - ③ 통과 시 protecting 해제 + 사용자 표기
       ------------------------------------------------------------------------- */
async function guardAdmin() {
  let session;

  try {
    const timeout = (ms) =>
      new Promise((_, reject) =>
        setTimeout(() => reject(new Error("getSession timeout")), ms)
      );

    const { data, error } = await Promise.race([
      sb.auth.getSession(),
      timeout(2000) // ✅ 2초 타임아웃
    ]);

    if (error) throw error;
    session = data?.session;
  } catch (e) {
    console.error("[guard] getSession error:", e);

    // ✅ 흰 화면 방지: 일단 화면 열고 안내/로그 확인 가능하게
    document.documentElement.classList.remove("protecting");

    // 원하면 여기서 로그인으로 보내도 됨:
    // kickLogin();
    return;
  }

  const user = session?.user;
  if (!user) return kickLogin();

  const email = user.email;
  const ghUser = user.user_metadata?.user_name;
  const ok =
    (email && ADMIN_EMAILS.includes(email)) ||
    (ghUser && ADMIN_USERNAMES.includes(ghUser));

  if (!ok) return kickDenied();

  document.getElementById("who").textContent = `(${email || ghUser})`;
  document.documentElement.classList.remove("protecting");
}


    // 미로그인 시 현재 URL을 next로 붙여 로그인 페이지로 보냄 → 로그인 후 원위치 복귀 가능
    function kickLogin() {

      // [기존 코드 - 보관용]
      // const next = encodeURIComponent(location.pathname + location.search);

      // [수정 코드 - hash까지 포함]
      const next = encodeURIComponent(location.pathname + location.search + location.hash);

      location.replace(`${LOGIN_URL}?next=${next}`);
    }

    // 로그인은 했지만 권한이 없는 계정 → denied 페이지로 이동
    function kickDenied() {
      location.replace(DENIED_URL);
    }

    /* -------------------------------------------------------------------------
       가드 폴백(안전장치)
       - 네트워크/스크립트 오류로 protecting 해제가 안 되면 5초 후 로그인으로 유도
       ------------------------------------------------------------------------- */

    // [기존 코드 - 보관용]
    /* ===================== [추가/수정된 부분 시작] =====================
       기존 폴백은 5초 후 무조건 kickLogin()이라
       네트워크/초기화 지연 시 "세션이 있는데도" 튕길 수 있음.
       -> 폴백에서 한 번 더 세션 확인 후 없을 때만 로그인으로 보냄.
    */
    // setTimeout(() => {
    //   if (document.documentElement.classList.contains('protecting')) {
    //     kickLogin();
    //   }
    // }, 5000);

    setTimeout(async () => {
      if (!document.documentElement.classList.contains('protecting')) return;
      const { data: { session } } = await sb.auth.getSession();
      if (!session) kickLogin();
      else document.documentElement.classList.remove("protecting");
    }, 5000);
    /* ===================== [추가/수정된 부분 끝] ===================== */

    
 // 탭/창 간 인증 상태 변화에도 가드를 재평가
sb.auth.onAuthStateChange(() => guardAdmin());

    .eq("id", productId)
    .single();

  if (error) throw error;
  if (!data) throw new Error("제품을 찾을 수 없습니다.");

  $("title").value = data.title || "";
  $("desc").value = data.description || "";
  $("material").value = data.material || "";
  $("usage").value = data.usage || "";
  $("types").value = data.types || "";
  $("price").value = (data.price ?? "");

  if (data.image_url) $("prevImg").src = data.image_url;
  
    // ✅ 수정 모드일 때 카테고리 select 자동 세팅
  await loadCategoryOptions(data.categoryId || "");
  if ($("categoryId")) $("categoryId").value = data.categoryId || "";

  const h1 = document.querySelector(".card h1");
  if (h1) h1.textContent = "제품 수정";
  const submitBtn = $("submitBtn");
  if (submitBtn) submitBtn.textContent = "수정 저장";

  updatePreview();
      // ✅ 기존 추가 이미지 불러오기
const { data: imgs } = await sb
  .from("product_image")
  .select("id,url")
  .eq("product_id", productId);
  
  const wrap = $("extraPreview");

// ✅ [추가] 삭제 대기열 초기화 (수정 진입 때마다)
window.__extraDeleteQueue = []; // [{ id, url }]

if (imgs && imgs.length) {
 wrap.innerHTML = (imgs && imgs.length)
  ? imgs.map(img => `
    <div style="position:relative; width:80px; height:80px;"
         data-wrap="imgBox"
         data-img-id="${img.id}"
         data-img-url="${img.url}">
      <img src="${img.url}"
           style="width:80px;height:80px;object-fit:cover;border-radius:6px; display:block;">
      <button type="button"
        data-action="mark-delete"
        style="
          position:absolute; top:4px; right:4px;
          width:22px; height:22px; border:0; border-radius:999px;
          background:rgba(0,0,0,.65); color:#fff; cursor:pointer;
          font-size:14px; line-height:22px;
        ">×</button>
    </div>
  `).join("")
  : "";

  // ✅ 이벤트 위임: X 버튼 클릭 시 개별 삭제
wrap.onclick = (e) => {
  const btn = e.target.closest("button[data-action='mark-delete']");
  if (!btn) return;

  const box = btn.closest("div[data-wrap='imgBox']");
  if (!box) return;

  const imgId  = box.getAttribute("data-img-id");
  const imgUrl = box.getAttribute("data-img-url");

  // 중복 등록 방지
  const exists = window.__extraDeleteQueue.some(x => String(x.id) === String(imgId));
  if (!exists) window.__extraDeleteQueue.push({ id: imgId, url: imgUrl });

  // UI에서만 제거
  box.remove();
};
  
}

  
}


// ✅ [교체된 초기 진입 시퀀스]
(async () => {
  try {
    await ensureSessionFromURL();
    await guardAdmin();

    // ✅ 수정 모드일 경우 기존 데이터 불러오기
    if (IS_EDIT) {
      await loadForEdit(EDIT_ID);
    } else {
      await loadCategoryOptions(""); // ✅ 신규 등록 시
    }
  } catch (e) {
    console.error(e);
    document.documentElement.classList.remove("protecting");
  }
})();


    /* -------------------------------------------------------------------------
       2) 미리보기 바인딩
       - 입력값 변동, 대표 이미지 선택 시 우측 '미리보기' 카드에 즉시 반영
       - 대표 이미지는 FileReader로 DataURL을 만들어 <img> src로 주입
       ------------------------------------------------------------------------- */
    
    ["title", "desc", "material", "usage", "types", "price"].forEach(id => {
      $(id).addEventListener("input", updatePreview);
    });

    $("image").addEventListener("change", updatePreview);

    function updatePreview() {
      $("prevTitle").textContent  = $("title").value || "제품명";
      $("prevTitle2").textContent = $("title").value || "-";
      $("prevDesc").textContent   = $("desc").value || "설명이 여기에 표시됩니다.";
      $("prevMaterial").textContent = $("material").value || "-";
      $("prevUsage").textContent    = $("usage").value || "-";
      $("prevTypes").textContent    = $("types").value || "-";
      $("prevPrice").textContent    = $("price").value ? Number($("price").value).toLocaleString() : "-";

      const file = $("image").files?.[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => $("prevImg").src = e.target.result;
        reader.readAsDataURL(file);
      }
    }
    updatePreview(); // 초기 프리뷰 렌더

    /* -------------------------------------------------------------------------
       3) 로그아웃
       - Supabase 세션 종료 후 로그인 페이지로 이동(복귀 경로는 index에서 처리)
       ------------------------------------------------------------------------- */
      document.getElementById("logoutBtn").addEventListener("click", async () => {
        await sb.auth.signOut({ scope: "local" });
        location.href = "https://github.com/logout";
      });

    /* -------------------------------------------------------------------------
       4) 제품 등록 플로우
       - 유효성 검사(필수: 제품명/대표 이미지)
       - 사용자 권한 재검증(세션/화이트리스트)
       - 스토리지에 대표 이미지 업로드 → 공개 URL 획득
       - product 테이블에 제품 메타데이터 insert → id 획득
       - 추가 이미지(여러 장) 업로드 → product_image 테이블에 연결 insert
       - 상태 메시지로 진행/성공/실패 표시
       ------------------------------------------------------------------------- */
document.getElementById("submitBtn").addEventListener("click", async () => {
  const imagesInput = document.getElementById("images");
  const status = $("status");
  const submitBtn = $("submitBtn");

  status.className = "status muted";
  status.textContent = IS_EDIT ? "수정 중..." : "업로드 중...";
  submitBtn.disabled = true;

  const categoryId = $("categoryId")?.value?.trim() || "";
  const title = $("title").value.trim();
  const file  = $("image").files?.[0]; // 수정 모드에서는 안 넣어도 될 수 있음

    // ✅ 카테고리 키 읽기 + 필수 검증
  
  if (!categoryId) {
    status.className = "status err";
    status.textContent = "카테고리는 필수입니다.";
    submitBtn.disabled = false;
    return;
  }
  if (!title) { status.className="status err"; status.textContent="제품명은 필수입니다."; submitBtn.disabled=false; return; }
  if (!IS_EDIT && !file) { status.className="status err"; status.textContent="대표 이미지를 선택하세요."; submitBtn.disabled=false; return; }

  try {
    // 권한 재검증
    const { data: { session } } = await sb.auth.getSession();
    const user = session?.user;
    const email = user?.email;
    const ghUser = user?.user_metadata?.user_name;
    const ok = user && ((email && ADMIN_EMAILS.includes(email)) || (ghUser && ADMIN_USERNAMES.includes(ghUser)));
    if (!ok) { kickLogin(); return; }


    // ✅ 공통 payload (image_url은 아래에서 조건적으로 추가)
    const payload = {
      categoryId: categoryId, // ✅ 추가
      title,
      description: $("desc").value || null,
      material: $("material").value || null,
      usage: $("usage").value || null,
      types: $("types").value || null,
      price: $("price").value ? Number($("price").value) : null,
    };

    // ✅ [추가] 수정 모드에서 대표이미지 교체 시 기존 대표이미지 URL 기억
let oldMainUrl = null;
if (IS_EDIT && file) {
  const { data: oldRow } = await sb
    .from("product")
    .select("image_url")
    .eq("id", EDIT_ID)
    .single();

  oldMainUrl = oldRow?.image_url || null;
}


 // ✅ [변경] 대표 이미지는 productId 폴더에 넣어야 하므로,
// 신규는 productId 확보 후 업로드/업데이트 해야 함.
// (여기서는 일단 업로드를 미룸: 아래 신규/수정 분기 이후에 업로드함)
let __mainFile = file || null;

let productId = EDIT_ID;

// ✅ [변경] 신규/수정 처리 (신규는 먼저 productId 확보)
if (IS_EDIT) {
  // 1) 텍스트/가격 등 업데이트
  const { error: upErr } = await sb
    .from("product")
    .update(payload)          // payload에 image_url은 없음
    .eq("id", EDIT_ID);
  if (upErr) throw upErr;

  productId = EDIT_ID;
} else {
  // 1) 신규는 먼저 row 생성 (image_url 없이) → id 확보
  const insertResult = await sb
    .from("product")
    .insert(payload)          // payload에 image_url은 없음
    .select("id")
    .single();
  if (insertResult.error) throw insertResult.error;

  productId = insertResult.data.id;
}

// 2) 대표 이미지 업로드 (파일 선택한 경우에만)
//    ✅ 대표/추가 모두 product/{productId}/ 로 통일
if (__mainFile) {
  const safeBase = __mainFile.name
    .normalize("NFKD")
    .replace(/[^\w.\-]+/g, "_")
    .replace(/^_+|_+$/g, "");

  const mainName = `main_${Date.now()}_${safeBase}`.replace(/_+/g, "_");
  const mainPath = `product/${productId}/${mainName}`;

  const { error: upErr } = await sb.storage
    .from(BUCKET)
    .upload(mainPath, __mainFile, {
      upsert: false,
      cacheControl: "3600",
      contentType: __mainFile.type || "application/octet-stream",
    });
  if (upErr) throw upErr;

  const { data: pub } = sb.storage.from(BUCKET).getPublicUrl(mainPath);

  // 3) product.image_url 업데이트
  const { error: mainUpdErr } = await sb
    .from("product")
    .update({ image_url: pub.publicUrl })
    .eq("id", productId);

  if (mainUpdErr) throw mainUpdErr;
// ✅ 완성본: 수정 모드에서 대표이미지 교체 성공 후, 이전 대표 이미지 파일 삭제
if (oldMainUrl) {
  // oldMainUrl 예: https://.../storage/v1/object/public/product-image/product/{id}/main_xxx.jpg
  // remove()에는 버킷 내부 경로만 필요: product/{id}/main_xxx.jpg
  const oldPath = oldMainUrl.split(`/storage/v1/object/public/${BUCKET}/`)[1];
  if (oldPath) {
    await sb.storage.from(BUCKET).remove([oldPath]).catch(() => {});
  }
}
}

    
    // ✅ 추가 이미지는 "선택된 것만" 업로드해서 product_image에 insert
const extras = imagesInput?.files ? Array.from(imagesInput.files) : [];
const progressBox = $("extraProgress");

if (extras.length) {
  const baseDir = `product/${productId}`;
  let done = 0;
  const total = extras.length;

  progressBox.className = "status muted";
  progressBox.textContent = `추가 이미지 업로드 시작 (0 / ${total})`;

  for (const f of extras) {
    done++;

    progressBox.textContent = `추가 이미지 업로드 중... (${done} / ${total})`;

    const safe = f.name
      .normalize("NFKD")
      .replace(/[^\w.\-]+/g, "_")
      .replace(/^_+|_+$/g, "");

    const name = `${Date.now()}_${safe}`.replace(/_+/g, "_");
    const p = `${baseDir}/${name}`;

    // 1) Storage 업로드
    const { error: upErr2 } = await sb.storage
      .from(BUCKET)
      .upload(p, f, {
        upsert: false,
        cacheControl: "3600",
        contentType: f.type || "application/octet-stream",
      });
    if (upErr2) throw upErr2;

    // 2) Public URL 얻기
    const { data: pub2 } = sb.storage.from(BUCKET).getPublicUrl(p);

    // 3) DB row insert
    const insImg = await sb.from("product_image").insert({
      product_id: productId,
      url: pub2.publicUrl,
    });
    if (insImg.error) throw insImg.error;
  }

  progressBox.className = "status ok";
  progressBox.textContent = `추가 이미지 업로드 완료 (${total}장)`;
} else {
  progressBox.textContent = "";
}

    // ✅ [추가] 수정 모드에서 "삭제 대기열" 실제 삭제 반영 (저장 눌렀을 때만)
if (IS_EDIT && window.__extraDeleteQueue && window.__extraDeleteQueue.length) {
  const q = window.__extraDeleteQueue.slice();
  window.__extraDeleteQueue = []; // 처리 후 비우기

  for (const item of q) {
    // 1) storage 파일 삭제
    const path = item.url.split(`/storage/v1/object/public/${BUCKET}/`)[1];
    if (path) {
      await sb.storage.from(BUCKET).remove([path]).catch(()=>{});
    }

    // 2) DB row 삭제
    const { error } = await sb.from("product_image").delete().eq("id", item.id);
    if (error) throw error;
  }
}

    status.className = "status ok";
    status.textContent = IS_EDIT ? "수정 완료! 잠시 후 목록으로 이동합니다." : "등록 완료! 잠시 후 목록으로 이동합니다.";
    setTimeout(() => {
                  location.href = "/admin/product.html";
          }, 600);
  } catch (e) {
    console.error(e);
    status.className = "status err";
    status.textContent = (IS_EDIT ? "수정 실패: " : "등록 실패: ") + (e?.message || e);
  } finally {
    submitBtn.disabled = false;
  }
});

  // ✅ 모드별 버튼 텍스트
 // ✅ 취소 버튼: 저장/수정 취소 확인 후 목록으로 이동
(function bindCancel() {
  const btn = document.getElementById("cancelBtn");
  if (!btn) return;

  btn.textContent = IS_EDIT ? "수정 취소" : "저장 취소";

  btn.addEventListener("click", () => {
    const msg = IS_EDIT
      ? "수정 취소 시 현재 변경된 내용이 사라집니다.\n상품 목록으로 이동할까요?"
      : "저장 취소 시 현재 입력한 내용이 사라집니다.\n상품 목록으로 이동할까요?";

    if (!confirm(msg)) return;

    // ✅ 목록으로 이동 (네 상단 '제품 목록 보기'와 동일 경로)
    location.href = "/admin/product.html";
  });
})();


  </script>

       - 목적: OAuth Redirect/세션 일관성, CORS 혼선 예방
       ========================================================================= */
(function enforceWWW() {
  const CANON = "www.eastpowermetal.com";
  const allowed = [CANON, "eastpowermetal.com"];
  if (allowed.includes(location.hostname) && location.hostname !== CANON) {
    location.replace(`https://${CANON}${location.pathname}${location.search}${location.hash}`);
  }
})();

<body>

<!-- =========================
     JavaScript 로직
========================= -->
<script>

/* =========================
   Supabase 프로젝트 접속 정보
========================= */
const SUPABASE_URL = "https://cwwnarmrvpvjptytepdo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3d25hcm1ydnB2anB0eXRlcGRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE4NzU4NTUsImV4cCI6MjA3NzQ1MTg1NX0.5mvgA_gKdlRaebVRSFIUJRKgp51zke_nffQ2jc8Ad1g";

/* Supabase REST API 엔드포인트
   - 연결 테이블명 : productCategory */
const API_BASE = `${SUPABASE_URL}/rest/v1/productCategory`;

/* Supabase 인증 헤더 */
const headers = {
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  "Content-Type": "application/json",
  "Accept": "application/json"
};

/* 전역 상태값 */
let rows = [];
let editingId = null;
const $ = id => document.getElementById(id);

/* =========================
   카테고리 목록 불러오기 (SELECT)
========================= */
async function load(){
  $("reloadBtn").disabled = true;
  const res = await fetch(`${API_BASE}?select=*&order=sort_order.asc`, { headers });
  if(!res.ok){ alert("조회 실패 : " + res.status); return; }
  const data = await res.json();

  rows = data.map(x => ({
    id:x.id,
    categoryKey:x.category_key,
    categoryName:x.category_name,
    sortOrder:x.sort_order,
    useYn:x.use_yn,
    remark:x.remark
  }));
  render();
  $("reloadBtn").disabled = false;
}

/* =========================
   테이블 화면 출력
========================= */
function render(){
  const tbody = $("tbody");
  tbody.innerHTML = "";

  // 🔹 검색어 소문자 변환
  const q = $("q").value.trim().toLowerCase();

  // 🔹 사용여부 필터 값
  const useFilter = $("useFilter").value;

  // 🔹 rows → 필터링된 목록 생성
  const filtered = rows.filter(r => {
    const key = (r.categoryKey || "").toLowerCase();
    const name = (r.categoryName || "").toLowerCase();

    // 검색어 조건
    const matchQ = !q || key.includes(q) || name.includes(q);

    // 사용여부 조건
    const matchUse = !useFilter || r.useYn === useFilter;

    return matchQ && matchUse;
  });

  // 🔹 필터링된 결과를 테이블에 출력
  filtered.forEach(r=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="mono">${r.categoryKey}</td>
      <td>${r.categoryName}</td>
      <td>${r.sortOrder}</td>
      <td><span class="pill">${r.useYn}</span></td>
      <td>
        <button class="btn secondary" onclick="editRow(${r.id})">수정</button>
        <button class="btn danger" onclick="deleteRow(${r.id})">삭제</button>
      </td>`;
    tbody.appendChild(tr);
  });

  // 🔹 건수 표시 (필터된 건 / 전체 건)
  $("countTxt").textContent = `${filtered.length}건 / 전체 ${rows.length}건`;
}
     
// 🔹 검색어 입력 시 즉시 테이블 다시 렌더링
$("q").addEventListener("input", render);
// 🔹 사용여부 선택 변경 시 즉시 테이블 다시 렌더링
$("useFilter").addEventListener("change", render);


/* =========================
   모달 열기 / 닫기
========================= */
function openModal(){
  $("modalTitle").innerText = editingId ? "카테고리 수정" : "카테고리 추가";
  $("backdrop").style.display="block";
  $("modal").style.display="block";
}

function closeModal(){
  $("backdrop").style.display="none";
  $("modal").style.display="none";
  editingId=null;
  $("form").reset();
}

/* 신규 추가 버튼 */
$("addBtn").onclick = ()=>{ editingId=null; openModal(); };

/* 수정 버튼 클릭 */
window.editRow = (id)=>{
  const r = rows.find(x=>x.id==id);
  editingId = id;
  $("CategoryKey").value = r.categoryKey;
  $("CategoryKey").disabled = false;
  $("CategoryName").value = r.categoryName;
  $("SortOrder").value = r.sortOrder;
  $("UseYn").value = r.useYn;
  $("Remark").value = r.remark || "";
  openModal();
};

/* 삭제 처리 (DELETE) */
window.deleteRow = async(id)=>{
  if(!confirm("삭제할까요?")) return;
  await fetch(`${API_BASE}?id=eq.${id}`, { method:"DELETE", headers });
  load();
};

/* =========================
   저장 처리
   - editingId 존재 → 수정(PATCH)
   - editingId 없음 → 신규추가(POST)
========================= */
$("form").onsubmit = async(e)=>{
  e.preventDefault();

  const body = {
    category_key: $("CategoryKey").value.trim(),
    category_name: $("CategoryName").value.trim(),
    sort_order: Number($("SortOrder").value||0),
    use_yn: $("UseYn").value,
    remark: $("Remark").value.trim()
  };

  if(editingId){
    await fetch(`${API_BASE}?id=eq.${editingId}`, {
      method:"PATCH", headers, body:JSON.stringify(body)
    });
  } else {
    await fetch(API_BASE,{
      method:"POST", headers, body:JSON.stringify(body)
    });
  }

  closeModal();
  load();
};

/* 취소 버튼 */
$("cancelBtn").onclick = closeModal;

/* 최초 페이지 진입 시 데이터 로드 */
load();


/* ============================================================================
   관리자 화이트리스트 & 경로
   - GitHub OAuth 후 user.email 또는 user_metadata.user_name를 기준으로 허용
   - LOGIN_URL: 미로그인 시 보낼 로그인 페이지
   - DENIED_URL: 로그인은 했으나 권한 없는 계정에 대한 차단 페이지
   ============================================================================ */
const ADMIN_EMAILS = ["chkim.epm@gmail.com"];
const ADMIN_USERNAMES = ["chkim-epm"];
const LOGIN_URL  = "/admin/index.html";   // 미로그인 시
const DENIED_URL = "/admin/denied.html";  // 권한 없음 시

/* ============================================================================
   Supabase 초기화: 브라우저 클라이언트 인스턴스 생성
   ============================================================================ */
// ⭐ 쿠키 기반 Session Storage (대용량 대응: 쿠키 쪼개서 저장)
// - 브라우저 종료 시 휘발: Expires/Max-Age 없이 "세션 쿠키"로 저장
// - 1쿠키 4KB 제한 회피: key를 key.0, key.1 ...로 분할 저장
const cookieStorage = (() => {
  const CHUNK_SIZE = 3000; // 안전 여유 (쿠키 오버헤드 고려)
   const OPTS = "path=/; SameSite=Lax; Domain=.eastpowermetal.com"; // ✅ 변경: www/non-www 모두에서 쿠키 공유

  const getCookie = (name) => {
    const m = document.cookie.match(new RegExp("(^| )" + name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "=([^;]+)"));
    return m ? decodeURIComponent(m[2]) : null;
  };

  const setCookie = (name, value) => {
    document.cookie = `${name}=${encodeURIComponent(value)}; ${OPTS}`;
  };

  const delCookie = (name) => {
     document.cookie = `${name}=; Max-Age=0; path=/; Domain=.eastpowermetal.com`; // ✅ 변경: 삭제도 동일 도메인 범위로
  };

  return {
    getItem: (key) => {
      const meta = getCookie(`${key}.__chunks`);
      if (!meta) return getCookie(key); // (과거 단일 쿠키 호환)
      const n = Number(meta);
      if (!Number.isFinite(n) || n <= 0) return null;

      let out = "";
      for (let i = 0; i < n; i++) {
        const part = getCookie(`${key}.${i}`);
        if (part == null) return null; // 중간 조각 누락
        out += part;
      }
      return out;
    },

    setItem: (key, value) => {
      // 기존 조각 제거
      const old = getCookie(`${key}.__chunks`);
      if (old) {
        const nOld = Number(old);
        if (Number.isFinite(nOld) && nOld > 0) {
          for (let i = 0; i < nOld; i++) delCookie(`${key}.${i}`);
        }
        delCookie(`${key}.__chunks`);
      }
      delCookie(key); // 단일 쿠키 쓰던 흔적 제거

      // 분할 저장
      const str = String(value ?? "");
      const chunks = [];
      for (let i = 0; i < str.length; i += CHUNK_SIZE) {
        chunks.push(str.slice(i, i + CHUNK_SIZE));
      }
      setCookie(`${key}.__chunks`, String(chunks.length));
      chunks.forEach((c, i) => setCookie(`${key}.${i}`, c));
    },

    removeItem: (key) => {
      const meta = getCookie(`${key}.__chunks`);
      if (meta) {
        const n = Number(meta);
        if (Number.isFinite(n) && n > 0) {
          for (let i = 0; i < n; i++) delCookie(`${key}.${i}`);
        }
        delCookie(`${key}.__chunks`);
      }
      delCookie(key);
    }
  };
})();


// 2) Supabase 클라이언트 생성
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    flowType: 'pkce',
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
    storage: cookieStorage,   // ✅ 여기만 변경
    storageKey: 'epm-admin-auth'
  }
});
                                                                    

/* ============================================================================
   OAuth 리디렉션 직후 세션 교환 처리
   - Supabase OAuth는 리다이렉트 시 URL에 code 또는 해시 토큰을 첨부
   - 해당 토큰을 세션으로 교환하여 현재 탭에 로그인 상태를 확립
   ============================================================================ */
async function ensureSessionFromURL() {
  // detectSessionInUrl 옵션이 자동으로 세션 교환 처리
  // 여기서는 URL에 남은 code/access_token 흔적만 제거
  if (location.search.includes("code=") || location.hash.includes("access_token")) {
    history.replaceState({}, document.title, location.pathname);
  }
}

/* ============================================================================
   화면 보호 가드 (인증 + 화이트리스트 확인)
   1) 세션 조회 → user 없으면 로그인 페이지로 보냄
   2) 이메일/깃허브 사용자명 화이트리스트 검사
   3) 통과 시 protecting 해제 → 본문 표시
   ============================================================================ */
async function guardAdmin() {
  console.log("[guard] entered");
  
  let session;
try {
  console.log("[guard] before getSession");

  const timeout = (ms) =>
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("getSession timeout")), ms)
    );

  const { data, error } = await Promise.race([
    sb.auth.getSession(),
    timeout(2000) // ✅ 2초 안에 응답 없으면 타임아웃
  ]);

  console.log("[guard] after getSession", { data, error });
  if (error) throw error;
  session = data?.session;
} catch (e) {
  console.error("[guard] getSession error:", e);
  // ✅ 흰 화면 방지: 일단 화면은 열어두고 상태 표시
  document.documentElement.classList.remove("protecting");
  
  return;
}


  const user = session?.user;
  if (!user) {
    console.log("[guard] no user -> kickLogin");
    return kickLogin();
  }

  const email = user.email;
  const ghUser = user.user_metadata?.user_name;

  console.log("[guard] email:", email, "ghUser:", ghUser);

  const ok =
    (email && ADMIN_EMAILS.includes(email)) ||
    (ghUser && ADMIN_USERNAMES.includes(ghUser));

  if (!ok) {
    console.log("[guard] not allowed -> kickDenied");
    return kickDenied();
  }

  
  document.documentElement.classList.remove("protecting");
}
  
/* ============================================================================
   미로그인 처리
   - 현재 위치를 next 파라미터로 전달하여 로그인 후 원래 페이지로 복귀 가능
   ============================================================================ */
function kickLogin(){
  const next = encodeURIComponent(location.pathname + location.search + location.hash);
  location.replace(`${LOGIN_URL}?next=${next}`);
}

  /* ============================================================================
   권한 없음 처리
   - 로그인은 했지만 화이트리스트 미통과 계정 → denied 페이지
   ============================================================================ */
function kickDenied(){
  location.replace(DENIED_URL);
}

/* ============================================================================
   세션 상태 변화 대응
   - 다른 탭/창에서 로그인/로그아웃 시에도 현재 페이지 가드 재평가
   ============================================================================ */
sb.auth.onAuthStateChange(() => guardAdmin());

  /* ============================================================================
   로그아웃
   - Supabase 세션 해제 후 로그인 페이지로 이동(복귀 경로는 index에서 처리)
   ============================================================================ */
$("logoutBtn").addEventListener("click", async ()=>{ 
  await sb.auth.signOut({ scope: "local" });

  location.href =
  "https://github.com/logout?return_to=https://www.eastpowermetal.com/admin/index.html";
});

     
</script>

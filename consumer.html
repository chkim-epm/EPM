  width:180px;
  height:138px;
  background:linear-gradient(to right, red, yellow, lime, cyan, blue, magenta, red);
  cursor:crosshair;
}

.custom-color-map:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.75));
}

.custom-color-map:after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to right, rgba(0,0,0,0), rgba(0,0,0,0.35));
}

.custom-hue-slider{

}

  top:73%;

  height:0;

  border-bottom:5px solid transparent;
  border-right:7px solid #111;
  pointer-events:none;
}

.custom-color-cross{
  position:absolute;
  width:12px;
  height:12px;
  transform:translate(-6px, -6px);
  pointer-events:none;
  z-index:2;
}

.custom-color-cross:before,
.custom-color-cross:after{
  content:"";
  position:absolute;
  background:#fff;

.custom-color-cross:before{

  top:0;

.custom-color-cross:after{

function saveEditorSelection(){
  const selection = window.getSelection();
  if(selection.rangeCount > 0 && editArea.contains(selection.anchorNode)){
    savedEditorRange = selection.getRangeAt(0).cloneRange();
  }
}

function keepEditorSelection(event){
  event.preventDefault();
  event.stopPropagation();
  saveEditorSelection();
}

function restoreEditorSelection(){
  if(!savedEditorRange) return;
  const selection = window.getSelection();
  selection.removeAllRanges();
  selection.addRange(savedEditorRange);
}

function runEditor(command, value = null){
  editArea.focus();
  restoreEditorSelection();
  document.execCommand(command, false, value);
  saveEditorSelection();
  updateToolbarState();
}

function toggleColorPanel(event, panelId){
  event.stopPropagation();
  restoreEditorSelection();

  document.querySelectorAll('.husky-color-panel').forEach(function(panel){
    if(panel.id !== panelId){
      panel.classList.remove('active');
    }
  });

  const panel = document.querySelector('#' + panelId);
  if(panel){
    panel.classList.toggle('active');
  }
}

function closeColorPanel(panelId){
  if(!panelId) return;
  const panel = document.querySelector('#' + panelId);
  if(panel){
    panel.classList.remove('active');
  }
}

function normalizeColorCodeSilent(colorCode){
  let value = String(colorCode || '').trim();
  if(value === '') return null;
  if(value.charAt(0) !== '#') value = '#' + value;
  const colorReg = new RegExp('^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$');
  return colorReg.test(value) ? value : null;
}

function normalizeColorCode(colorCode){
  const value = normalizeColorCodeSilent(colorCode);
  if(value) return value;
  alert('색상코드는 #000000 형식으로 입력해주세요.');
  return null;
}

function applyColorCode(command, inputId, panelId = null){
  const input = document.querySelector('#' + inputId);
  if(!input) return;

  const colorValue = normalizeColorCode(input.value);
  if(!colorValue){
    input.focus();
    return;
  }

  input.value = colorValue;
  addRecentColor(panelId, colorValue);
  runEditor(command, colorValue);
  closeColorPanel(panelId);
}

function handleColorEnter(event, command, inputId, panelId = null){
  saveEditorSelection();
  if(event.key === 'Enter'){
    event.preventDefault();
    applyColorCode(command, inputId, panelId);
  }
}

const themeColors = [
  '#ffffff','#000000','#e7e6e6','#44546a','#4472c4','#ed7d31','#a5a5a5','#ffc000','#5b9bd5','#70ad47',
  '#f2f2f2','#7f7f7f','#d9d9d9','#d6dce4','#d9e2f3','#fce4d6','#ededed','#fff2cc','#ddebf7','#e2f0d9',
  '#d9d9d9','#595959','#bfbfbf','#adb9ca','#b4c6e7','#f8cbad','#dbdbdb','#ffe699','#bdd7ee','#c6e0b4',
  '#bfbfbf','#404040','#a6a6a6','#8497b0','#8eaadb','#f4b183','#c9c9c9','#ffd966','#9dc3e6','#a9d18e',
  '#a6a6a6','#262626','#7f7f7f','#323e4f','#2f5597','#c55a11','#7b7b7b','#bf9000','#2e75b6','#548235',
  '#808080','#0d0d0d','#595959','#222a35','#1f3864','#833c0c','#525252','#7f6000','#1f4e79','#375623'
];

const standardColors = ['#c00000','#ff0000','#ffc000','#ffff00','#92d050','#00b050','#00b0f0','#0070c0','#002060','#7030a0'];
const recentColors = [];

function colorCellHtml(command, color, panelId){
  return '<span class="color-cell" style="background:' + color + '" onmousedown="keepEditorSelection(event)" onclick="quickColor(' + "'" + command + "','" + color + "','" + panelId + "'" + ')"></span>';
}

function renderColorPalettes(){
  document.querySelectorAll('[data-palette]').forEach(function(grid){
    const panelId = grid.dataset.palette;
    const panel = document.querySelector('#' + panelId);
    if(!panel) return;
    const command = panel.dataset.command;
    grid.innerHTML = themeColors.map(function(color){
      return colorCellHtml(command, color, panelId);
    }).join('');
  });

  document.querySelectorAll('[data-standard]').forEach(function(grid){
    const panelId = grid.dataset.standard;
    const panel = document.querySelector('#' + panelId);
    if(!panel) return;
    const command = panel.dataset.command;
    grid.innerHTML = standardColors.map(function(color){
      return colorCellHtml(command, color, panelId);
    }).join('');
  });

  renderRecentColors();
}

function renderRecentColors(){
  document.querySelectorAll('[data-recent]').forEach(function(grid){
    const panelId = grid.dataset.recent;
    const panel = document.querySelector('#' + panelId);
    if(!panel) return;
    const command = panel.dataset.command;
    const colors = recentColors.length ? recentColors : ['#0d1b3e'];
    grid.innerHTML = colors.map(function(color){
      return colorCellHtml(command, color, panelId);
    }).join('');
  });
}

function addRecentColor(panelId, color){
  const hex = normalizeColorCodeSilent(color);
  if(!hex) return;

  const index = recentColors.indexOf(hex);
  if(index > -1){
    recentColors.splice(index, 1);
  }

  recentColors.unshift(hex);
  if(recentColors.length > 8){
    recentColors.pop();
  }

  renderRecentColors();
}

function openCustomColor(event, panelId){
  event.stopPropagation();
  restoreEditorSelection();

  document.querySelectorAll('.husky-color-panel').forEach(function(panel){
    panel.classList.remove('active');
  });

  const panel = document.querySelector('#' + panelId);
  if(!panel) return;
  panel.classList.add('active');

  const command = panel.dataset.command;
  let current = command === 'hiliteColor' ? '#ffffff' : '#000000';

  try{
    const queryValue = document.queryCommandValue(command);
    const normalized = normalizeBrowserColor(queryValue);
    if(normalized){
      current = normalized;
    }
  }catch(e){}

  const prefix = panelId.indexOf('font') === 0 ? 'font' : 'bg';
  const currentPreview = document.querySelector('#' + prefix + 'CurrentPreview');
  const newPreview = document.querySelector('#' + prefix + 'CustomPreview');
  const codeInput = document.querySelector('#' + prefix + 'ColorCode');

  if(currentPreview){
    currentPreview.style.background = current;
  }
  if(newPreview){
    newPreview.style.background = current;
  }
  if(codeInput){
    codeInput.value = current;
    hexToRgbInput(prefix);
  }
}

let selectedHue = 180;
let selectedShade = 0.5;

function pickCustomColor(event, inputId, previewId){
  const rect = event.currentTarget.getBoundingClientRect();
  const x = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
  const y = Math.max(0, Math.min(1, (event.clientY - rect.top) / rect.height));

  selectedHue = x * 360;
  selectedShade = y;
  updateCustomColor(inputId, previewId, selectedHue, selectedShade, x, y);
}

function updateCustomColor(inputId, previewId, hue, shade, xPos = null, yPos = null){
  const light = 100 - (shade * 85);
  const rgb = hslToRgb(hue, 85, light);
  const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
  const prefix = inputId === 'fontColorCode' ? 'font' : 'bg';

  const input = document.querySelector('#' + inputId);
  const preview = document.querySelector('#' + previewId);
  const rInput = document.querySelector('#' + prefix + 'R');
  const gInput = document.querySelector('#' + prefix + 'G');
  const bInput = document.querySelector('#' + prefix + 'B');

  if(input) input.value = hex;
  if(preview) preview.style.background = hex;
  if(rInput) rInput.value = rgb.r;
  if(gInput) gInput.value = rgb.g;
  if(bInput) bInput.value = rgb.b;

  const cross = document.querySelector('#' + prefix + 'CustomCross');
  if(cross && xPos !== null && yPos !== null){
    cross.style.left = (xPos * 100) + '%';
    cross.style.top = (yPos * 100) + '%';
  }

  updateShadeBar(hue, shade);
}

function startColorDrag(event, inputId, previewId){
  keepEditorSelection(event);
  isDraggingColor = true;
  dragColorContext = {
    type: 'map',
    inputId: inputId,
    previewId: previewId,
    target: event.currentTarget
  };
  pickCustomColor(event, inputId, previewId);
  document.addEventListener('mousemove', onColorDrag);
  document.addEventListener('mouseup', stopColorDrag);
}

function startShadeDrag(event){
  keepEditorSelection(event);
  const panel = event.currentTarget.closest('.custom-color-panel');
  if(!panel) return;

  const inputId = panel.dataset.input;
  const prefix = inputId === 'fontColorCode' ? 'font' : 'bg';
  const previewId = prefix + 'CustomPreview';

  isDraggingColor = true;
  dragColorContext = {
    type: 'shade',
    inputId: inputId,
    previewId: previewId,
    target: event.currentTarget
  };
  pickShadeColor(event, inputId, previewId);
  document.addEventListener('mousemove', onColorDrag);
  document.addEventListener('mouseup', stopColorDrag);
}

function pickShadeColor(event, inputId, previewId){
  const rect = event.currentTarget.getBoundingClientRect();
  const y = Math.max(0, Math.min(1, (event.clientY - rect.top) / rect.height));
  selectedShade = y;
  updateCustomColor(inputId, previewId, selectedHue, selectedShade);
  updateShadeBar(selectedHue, selectedShade);
}

function updateShadeBar(hue, shade){
  document.querySelectorAll('.custom-hue-slider').forEach(function(slider){
    slider.style.background = 'linear-gradient(to bottom, hsl(' + hue + ', 85%, 95%), hsl(' + hue + ', 85%, 55%), hsl(' + hue + ', 85%, 25%), #000000)';
    const arrow = slider.querySelector('.custom-hue-arrow');
    if(arrow){
      arrow.style.top = (shade * 100) + '%';
    }
  });
}

function onColorDrag(event){
  if(!isDraggingColor || !dragColorContext) return;

  const dragEvent = {
    clientX: event.clientX,
    clientY: event.clientY,
    currentTarget: dragColorContext.target
  };

  if(dragColorContext.type === 'shade'){
    pickShadeColor(dragEvent, dragColorContext.inputId, dragColorContext.previewId);
    return;
  }

  pickCustomColor(dragEvent, dragColorContext.inputId, dragColorContext.previewId);
}

function stopColorDrag(){
  isDraggingColor = false;
  dragColorContext = null;
  document.removeEventListener('mousemove', onColorDrag);
  document.removeEventListener('mouseup', stopColorDrag);
}

function rgbToHexInput(prefix){
  const rInput = document.querySelector('#' + prefix + 'R');
  const gInput = document.querySelector('#' + prefix + 'G');
  const bInput = document.querySelector('#' + prefix + 'B');
  const codeInput = document.querySelector('#' + prefix + 'ColorCode');
  const preview = document.querySelector('#' + prefix + 'CustomPreview');

  const r = clampColor(rInput ? rInput.value : 0);
  const g = clampColor(gInput ? gInput.value : 0);
  const b = clampColor(bInput ? bInput.value : 0);
  const hex = rgbToHex(r, g, b);

  if(codeInput) codeInput.value = hex;
  if(preview) preview.style.background = hex;
}

function hexToRgbInput(prefix){
  const input = document.querySelector('#' + prefix + 'ColorCode');
  if(!input) return;

  const hex = normalizeColorCodeSilent(input.value);
  if(!hex) return;

  const rgb = hexToRgb(hex);
  const rInput = document.querySelector('#' + prefix + 'R');
  const gInput = document.querySelector('#' + prefix + 'G');
  const bInput = document.querySelector('#' + prefix + 'B');
  const preview = document.querySelector('#' + prefix + 'CustomPreview');

  if(rInput) rInput.value = rgb.r;
  if(gInput) gInput.value = rgb.g;
  if(bInput) bInput.value = rgb.b;
  if(preview) preview.style.background = hex;

  const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
  selectedHue = hsl.h;
  selectedShade = 1 - (hsl.l / 100);
  updateShadeBar(selectedHue, selectedShade);
}

function clampColor(value){
  return Math.max(0, Math.min(255, Number(value) || 0));
}

function rgbToHex(r, g, b){
  return '#' + [r,g,b].map(function(v){
    return clampColor(v).toString(16).padStart(2, '0');
  }).join('');
}

function hexToRgb(hex){
  const clean = hex.replace('#', '');
  const full = clean.length === 3 ? clean.split('').map(function(c){ return c + c; }).join('') : clean;
  return {
    r: parseInt(full.substring(0,2), 16),
    g: parseInt(full.substring(2,4), 16),
    b: parseInt(full.substring(4,6), 16)
  };
}

function normalizeBrowserColor(value){
  if(!value) return null;
  if(value.indexOf('#') === 0){
    return normalizeColorCodeSilent(value);
  }

  if(value.indexOf('rgb') === 0){
    const nums = value.replace(/[rgba() ]/g, '').split(',');
    if(nums.length >= 3){
      return rgbToHex(nums[0], nums[1], nums[2]);
    }
  }

  return null;
}

function hslToRgb(h, s, l){
  s /= 100;
  l /= 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r = 0, g = 0, b = 0;

  if(h < 60){ r = c; g = x; }
  else if(h < 120){ r = x; g = c; }
  else if(h < 180){ g = c; b = x; }
  else if(h < 240){ g = x; b = c; }
  else if(h < 300){ r = x; b = c; }
  else{ r = c; b = x; }

  return {
    r: Math.round((r + m) * 255),
    g: Math.round((g + m) * 255),
    b: Math.round((b + m) * 255)
  };
}

function rgbToHsl(r, g, b){
  r = clampColor(r) / 255;
  g = clampColor(g) / 255;
  b = clampColor(b) / 255;

  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  let h = 0;
  let s = 0;
  const l = (max + min) / 2;

  if(max !== min){
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);

    if(max === r){
      h = (g - b) / d + (g < b ? 6 : 0);
    }else if(max === g){
      h = (b - r) / d + 2;
    }else{
      h = (r - g) / d + 4;
    }

    h *= 60;
  }

  return {
    h: h,
    s: s * 100,
    l: l * 100
  };
}

function updateToolbarState(){
  document.querySelectorAll('.husky-toolbar [data-state]').forEach(function(item){
    const command = item.dataset.state;
    let isActive = false;

    try{
      isActive = document.queryCommandState(command);
    }catch(e){
      isActive = false;
    }

    item.classList.toggle('active', isActive);
  });
}

['keyup', 'mouseup', 'focus', 'input'].forEach(function(eventName){
  editArea.addEventListener(eventName, function(){
    saveEditorSelection();
    updateToolbarState();
  });
});


function setEmailDomain(select){
  const domainInput = document.querySelector('#emailDomainInput');

  if(select.value === ''){
    domainInput.value = '';
    domainInput.readOnly = false;
    domainInput.focus();
    return;
  }

  domainInput.value = select.value;
  domainInput.readOnly = true;
}


async function uploadEditorPasteImage(file){
  const ext = file.type.split('/')[1] || 'png';
  const fileName = `paste_${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const filePath = `inquiry/editor/${fileName}`;

  const { error: uploadError } = await sb.storage
    .from('inquiry-file')
    .upload(filePath, file, {
      upsert:false,
      cacheControl:'3600',
      contentType:file.type || 'image/png'
    });

  if(uploadError) throw uploadError;

  return {
    bucket:'inquiry-file',
    path:filePath,
    name:fileName,
    type:file.type,
    size:file.size
  };
}

function insertEditorImagePreview(fileInfo, file){
  const blobUrl = URL.createObjectURL(file);

  const img = document.createElement('img');
  img.src = blobUrl;
  img.setAttribute('data-bucket', fileInfo.bucket);
  img.setAttribute('data-path', fileInfo.path);
  img.setAttribute('data-name', fileInfo.name);
  img.style.maxWidth = '100%';
  img.style.height = 'auto';

  editArea.focus();
  restoreEditorSelection();

  const selection = window.getSelection();

  if(selection.rangeCount > 0){
    const range = selection.getRangeAt(0);
    range.deleteContents();
    range.insertNode(img);
    range.setStartAfter(img);
    range.setEndAfter(img);
    selection.removeAllRanges();
    selection.addRange(range);
  }else{
    editArea.appendChild(img);
  }

  saveEditorSelection();
}

editArea.addEventListener('paste', async function(e){
  const items = e.clipboardData && e.clipboardData.items;
  if(!items) return;

  const imageItems = Array.from(items).filter(function(item){
    return item.type.indexOf('image') === 0;
  });

  if(imageItems.length === 0) return;

  e.preventDefault();

  for(const item of imageItems){
    const file = item.getAsFile();
    if(!file) continue;

    try{
      const fileInfo = await uploadEditorPasteImage(file);
      insertEditorImagePreview(fileInfo, file);
    }catch(error){
      console.error(error);
      alert('붙여넣은 이미지 업로드 중 오류가 발생했습니다.');
    }
  }
});

function getEditorContentForSave(){
  const clone = editArea.cloneNode(true);

  clone.querySelectorAll('img[data-path]').forEach(function(img){
    const bucket = img.getAttribute('data-bucket');
    const path = img.getAttribute('data-path');

    img.setAttribute('src', `storage://${bucket}/${path}`);
  });

  return clone.innerHTML;
}



document.querySelector('form').addEventListener('submit', async function(e){
  e.preventDefault();

  hiddenContent.value = getEditorContentForSave();

  const companyInput = document.querySelector('.form-row:nth-of-type(1) input');
  const nameInput = document.querySelector('.form-row:nth-of-type(2) input');
  const phoneInputs = document.querySelectorAll('.phone-group input');
  const emailInputs = document.querySelectorAll('.email-group input');
  const titleInput = document.querySelector('.form-row:nth-of-type(5) input');
  const fileInput = document.querySelector('.file-box input[type="file"]');
  const submitBtn = document.querySelector('.submit-btn');

  if(nameInput.value.trim() === ''){
    alert('이름을 입력해주세요.');
    nameInput.focus();
    return;
  }

  if(
    phoneInputs[0].value.trim() === '' ||
    phoneInputs[1].value.trim() === '' ||
    phoneInputs[2].value.trim() === ''
  ){
    alert('전화번호를 입력해주세요.');
    phoneInputs[0].focus();
    return;
  }

  if(
    emailInputs[0].value.trim() === '' ||
    emailInputs[1].value.trim() === ''
  ){
    alert('이메일을 입력해주세요.');
    emailInputs[0].focus();
    return;
  }

  if(titleInput.value.trim() === ''){
    alert('제목을 입력해주세요.');
    titleInput.focus();
    return;
  }

  if(editArea.innerText.trim() === ''){
    alert('내용을 입력해주세요.');
    editArea.focus();
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = '저장 중...';

  try{
    const fileUrls = [];
    const files = fileInput.files ? Array.from(fileInput.files) : [];

    for(const file of files){
	  const safeName = file.name
		.normalize('NFKD')
		.replace(/[^\w.\-]+/g, '_')
		.replace(/^_+|_+$/g, '');

	  const filePath = `inquiry/${Date.now()}_${safeName}`;

	  const { error: uploadError } = await sb.storage
		.from('inquiry-file')
		.upload(filePath, file, {
		  upsert:false,
		  cacheControl:'3600',
		  contentType:file.type || 'application/octet-stream'
		});

	  if(uploadError) throw uploadError;

	  fileUrls.push({
		bucket: 'inquiry-file',
		path: filePath,
		name: file.name,
		type: file.type,
		size: file.size
	  });
	}
    const phone = `${phoneInputs[0].value.trim()}-${phoneInputs[1].value.trim()}-${phoneInputs[2].value.trim()}`;
    const email = `${emailInputs[0].value.trim()}@${emailInputs[1].value.trim()}`;

    const { error } = await sb
      .from('inquiry')
      .insert({
        company: companyInput.value.trim() || null,
        name: nameInput.value.trim(),
        phone: phone,
        email: email,
        title: titleInput.value.trim(),
        content: hiddenContent.value,
        file_urls: fileUrls
      });

    if(error) throw error;

    alert('문의가 정상적으로 접수되었습니다.');
    e.target.reset();
    editArea.innerHTML = '';
    hiddenContent.value = '';

  }catch(error){
    console.error(error);
    alert('문의 저장 중 오류가 발생했습니다.');
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = '문의하기';
  }
});

renderColorPalettes();
</script>

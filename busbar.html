/* ================= 상품 카드 그리드 ================= */
.product-grid {
  display: grid;                             /* 그리드 레이아웃 */
  grid-template-columns: repeat(auto-fill, 
                        minmax(320px, 1fr)); /* 최소 320px, 공간 따라 자동 줄바꿈 */
  gap: 1.5rem;                               /* 카드 사이 간격 */

  max-width: 1200px;                         /* 전체 너비 제한 */

}

/* ================= 개별 카드 ================= */
.product-card {
  background: #fff;                          /* 카드 배경 */
  border-radius: 8px;                        /* 둥근 모서리 */
  overflow: hidden;                          /* 테두리 밖 요소 가림 */

  text-align: center;                        /* 텍스트 중앙 정렬 */
  transition: transform 0.3s, box-shadow 0.3s; /* hover 애니메이션 */
  display: flex;                             /* 세로 정렬을 위한 flex */
  flex-direction: column;                    /* 위→아래 배치 */
  justify-content: flex-start;               /* 상단부터 배치 */
}

/* ================= 카드 Hover 효과 ================= */
.product-card:hover {
  transform: translateY(-5px);               /* 살짝 띄우기 */
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);    /* 그림자 강조 */
}

/* ================= 카드 안 이미지 ================= */
.product-card img {
  width: 100%;                               /* 가로 폭 채움 */
  height: 280px;                             /* 고정 높이 */

}

/* ================= 카드 정보 영역 ================= */
.product-info {
  padding: 1rem;                             /* 내부 여백 */
}

.product-info h2 {
  font-size: 1.2rem;                         /* 상품명 크기 */
  margin: 0.5rem 0;                          /* 위/아래 여백 */
}

.product-info p {
  font-size: 0.9rem;                         /* 설명 글자 크기 */
  color: #555;                               /* 회색 계열 텍스트 */
  white-space: pre-line;   	 				 /* ✅ 줄바꿈(\n) 그대로 표시 */
}

.product-info a {
  display: inline-block;                     /* 버튼 형태 */
  margin-top: 0.5rem;
  padding: 0.4rem 0.8rem;
  background-color: #23585C;                 /* 브랜드 톤 버튼 배경 */
  color: #fff;                               /* 흰 텍스트 */
  text-decoration: none;                     /* 밑줄 제거 */
  border-radius: 4px;                        /* 둥근 모서리 */
  transition: background-color 0.3s;         /* hover 전환 */
}

.product-info a:hover {
  background-color: #2980b9;                 /* hover 시 색상 변화 */
}

/* ================= 카드 안 표 ================= */
.product-table {
  margin-top: 1rem;                          /* 위쪽 여백 */
  text-align: left;                          /* 왼쪽 정렬 */
}

.product-table table {
  width: 100%;                               /* 가로 채움 */
  border-collapse: collapse;                 /* 테이블 선 겹침 제거 */
}

.product-table th,
.product-table td {
  padding: 0.4rem 0.6rem;                    /* 셀 여백 */
  border-bottom: 1px solid #ddd;             /* 구분선 */
}

.product-table th {
  background-color: #f9f9f9;                 /* 헤더 배경 */
  font-weight: bold;                         /* 굵은 글자 */
}

.product-table td {
  color: #555;                               /* 일반 셀 텍스트 색상 */
}

/* ================= 페이지네이션 ================= */

/* 페이지네이션 컨테이너 (가운데 정렬, 여백) */
.pager{
  display:flex; gap:8px; justify-content:center; align-items:center;

/* 페이지 버튼 기본 스타일 */
.page-btn{

}

/* 현재 페이지 활성화 스타일 */

  background:#23585C; color:#fff; border-color:#23585C; font-weight:700;
}

/* 비활성 버튼(이전/다음 경계) */
.page-btn[disabled]{ opacity:.5; cursor:not-allowed; }

/* 생략부(...) 표시 요소 */
.page-ellipsis{
  padding:0 6px; color:#888; user-select:none;
}

<!-- ✅ Supabase에서 product 테이블을 불러와 카드 렌더 -->
<script>
  // Supabase 프로젝트 URL/anon 키 (퍼블릭 클라이언트에서 제한 권한으로 사용)
  const SUPABASE_URL = "https://cwwnarmrvpvjptytepdo.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3d25hcm1ydnB2anB0eXRlcGRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE4NzU4NTUsImV4cCI6MjA3NzQ1MTg1NX0.5mvgA_gKdlRaebVRSFIUJRKgp51zke_nffQ2jc8Ad1g";

  // SDK 로드 실패 시 사용자에게 안내
  if (typeof supabase === "undefined") {
    document.querySelector(".product-grid").innerHTML = "오류: supabase SDK 로딩 실패";
    throw new Error("Supabase SDK not loaded");
  }
  // Supabase 클라이언트 인스턴스 생성
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  /* 페이지네이션 기본 설정값 */
  const PAGE_SIZE = 6;     // 한 페이지 카드 수
  let currentPage = 1;     // 현재 페이지 상태

  // 검색어 상태(전역 보관: 페이징 시 검색 유지)
  let currentQuery = "";

  /* 카드 HTML을 만들어 .product-grid 컨테이너에 주입 */
  function renderCards(items){
    const grid = document.querySelector(".product-grid");
    if (!items || items.length === 0){
      grid.innerHTML = "등록된 제품이 없습니다.";
      return;
    }
    // 제품 정보 p를 기반으로 카드 템플릿 생성
    grid.innerHTML = items.map(p => `
      <div class="product-card">
        <a href="detail.html?id=${p.id}" style="display:block">
          <img src="${p.image_url || ''}" alt="${(p.title || '').replace(/"/g,'&quot;')}" loading="lazy">
        </a>
        <div class="product-info">
          <h2>${p.title || '-'}</h2>
          <p>${p.description ? p.description : ''}</p>
          <div class="product-table">
            <table>
              <tbody>
                <tr><th>재질</th><td>${p.material || '-'}</td></tr>
                <tr><th>용도</th><td>${p.usage || '-'}</td></tr>
                <tr><th>종류</th><td>${p.types || '-'}</td></tr>
				<tr><th>가격</th><td>${p.price ? Number(p.price).toLocaleString() + '원' : '-'}</td></tr>
              </tbody>
            </table>
          </div>
          <!-- 상세 페이지로 이동하는 버튼 -->
          <a href="detail.html?id=${p.id}">자세히 보기</a>
        </div>
      </div>
    `).join("");
  }

  /* 총 개수/현재 페이지를 기반으로 페이지네이션 버튼 렌더 */
  function renderPager(totalCount, page){
    const pager = document.getElementById("pager");
    const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));

    // 버튼 템플릿 헬퍼
    const btn = (p, label = p, {active=false, disabled=false}={}) =>
      `<button class="page-btn ${active?'active':''}" ${disabled?'disabled':''} data-p="${p}">${label}</button>`;
    const dots = `<span class="page-ellipsis">…</span>`;

    // 표시할 페이지 셋 구성(1 … p-1 p p+1 … last)
    const pages = [];
    const push = (x)=>pages.push(x);

    const addRange = (s,e)=>{
      for(let i=s;i<=e;i++) push(i);
    };

    const first = 1, last = totalPages;
    const left = Math.max(first, page-1);
    const right = Math.min(last, page+1);

    push(first);
    if (left > first+1) push("dots-left");
    addRange(Math.max(first+1, left), Math.min(last-1, right));
    if (right < last-1) push("dots-right");
    if (last !== first) push(last);

    // 실제 HTML 조립
    let html = '';
    html += btn(Math.max(first, page-1), "‹", {disabled: page===first});
    for(const p of pages){
      if (p==="dots-left" || p==="dots-right"){ html += dots; continue; }
      html += btn(p, String(p), {active: p===page});
    }
    html += btn(Math.min(last, page+1), "›", {disabled: page===last});

    pager.innerHTML = html;

    // 페이지 버튼 클릭 이벤트(이벤트 위임)
    pager.onclick = (e)=>{
      const t = e.target;
      if (!t.classList.contains("page-btn")) return;
      const p = Number(t.dataset.p);
      if (!p || p===page) return;
      // 검색어 유지한 채로 해당 페이지 로드
      loadProducts(p, currentQuery);
      // UX: 페이지 전환 시 상단으로 스크롤
      window.scrollTo({top:0, behavior:'smooth'});
    };
  }


  /* 목록 로드: page(페이지 번호), q(검색어) */
  async function loadProducts(page=1, q=""){
    currentPage = page;
    currentQuery = q;

    const grid = document.querySelector(".product-grid");
    grid.innerHTML = "불러오는 중...";

    // Supabase range 계산(0-base index)
    const from = (page - 1) * PAGE_SIZE;
    const to   = from + PAGE_SIZE - 1;

    // 기본 쿼리: 최신 등록순(created_at desc), 전체 개수 count 포함
    let query = sb
      .from("product")
      .select("*", { count: "exact" })
      .order("created_at", { ascending: false })
      .range(from, to);
	  query = query.eq("categoryId", "1");

    // 검색어가 있으면 title/description/material/usage/types 중 하나라도 일치(ILIKE)
    if (q && q.trim() !== "") {
      const term = q.trim();
      query = query.or(
        `title.ilike.%${term}%,description.ilike.%${term}%,material.ilike.%${term}%,usage.ilike.%${term}%,types.ilike.%${term}%`
      );
    }

    const { data, error, count } = await query;

    // 오류 처리
    if (error){
      grid.innerHTML = "DB 조회 오류: " + error.message;
      console.error("Supabase select error:", error);
      return;
    }

    // 목록/페이지네이션 렌더
    renderCards(data);
    renderPager(count ?? 0, page);
  }

  // 디바운스 유틸: 입력이 잠시 멈추면 콜백 실행(입력 폭주 방지)
  function debounce(fn, ms=300){
    let t; return (...args)=>{ clearTimeout(t); t=setTimeout(()=>fn(...args), ms); };
  }

  // 검색 입력/초기화 버튼 이벤트 바인딩
  const qInput  = document.getElementById("q");
  const clearBtn = document.getElementById("clearBtn");

  if (qInput) {
    // 입력 300ms 정지 시 검색 수행
    qInput.addEventListener("input", debounce(()=>{
      loadProducts(1, qInput.value);
    }, 300));
  }
  if (clearBtn) {
    // 검색어 비우고 1페이지 재조회
    clearBtn.addEventListener("click", ()=>{
      if (!qInput) return;
      qInput.value = "";
      loadProducts(1, "");
    });
  }

  // 최초 로딩: 검색어 없이 1페이지
  loadProducts(1, "");

  // 네트워크/권한 문제로 응답 지연될 경우 사용자 안내(8초 타임아웃)
  setTimeout(() => {
    const txt = document.querySelector(".product-grid")?.textContent || "";
    if (txt.includes("불러오는 중")) {
      document.querySelector(".product-grid").innerHTML =
        "시간 초과: 네트워크/권한 문제일 수 있습니다. 브라우저 콘솔(F12) → Console/Network 로그 확인해 주세요.";
    }
  }, 8000);
</script>

</script> <!-- (원본 유지) 중복 </script> 태그가 있어도 기능엔 영향 없음 -->

</body>
